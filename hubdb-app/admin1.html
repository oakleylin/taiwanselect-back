<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動列表 · 後台管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin1.css">
</head>
<body>

<div class="layout">

  <!-- ════════════════ Sidebar ════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark"></div>
      <span class="logo-text">EventHub</span>
    </div>

    <p class="nav-section-label">NAVIGATION</p>

    <nav class="sidebar-nav">

      <!-- 活動列表 (active) — 第一位 -->
      <button class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>活動列表</span>
      </button>

      <!-- 展覽公司 -->
      <div class="nav-group">
        <button class="nav-item has-submenu" onclick="toggleMenu('sponsorMenu', this)">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>展覽公司</span>
          <svg class="nav-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div id="sponsorMenu" class="sidebar-submenu">
          <button class="submenu-item">東京國際食品展 FOODEX JAPAN 2026</button>
          <button class="submenu-item">新加坡國際食品展 FHA Singapore 2026</button>
          <button class="submenu-item">澳洲國際食品展 Fine Food Australia 2026</button>
          <button class="submenu-item">橫跨美洲：美墨巴食品拓銷團 2026</button>
          <button class="submenu-item">巴黎國際食品展 SIAL PARIS 2026</button>
        </div>
      </div>

      <!-- 食品分類 -->
      <div class="nav-group">
        <button class="nav-item has-submenu" onclick="toggleMenu('foodMenu', this)">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
          <span>食品分類</span>
          <svg class="nav-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div id="foodMenu" class="sidebar-submenu">
          <button class="submenu-item">點心及即時食品</button>
          <button class="submenu-item">調味及油品</button>
          <button class="submenu-item">飲品及珍奶</button>
          <button class="submenu-item">魚畜蛋奶製品</button>
          <button class="submenu-item">穀類產品</button>
          <button class="submenu-item">蔬果</button>
          <button class="submenu-item">植物性飲食</button>
          <button class="submenu-item">清真食品</button>
        </div>
      </div>

    </nav>
  </aside>
  <!-- ════════════════ /Sidebar ════════════════ -->


  <!-- ════════════════ Main ════════════════ -->
  <div class="main">

    <!-- Page Header -->
    <div class="page-header">
      <div class="header-titles">
        <h1 class="page-title">活動列表</h1>
        <p class="page-subtitle">Event List</p>
      </div>
      <div class="header-actions">
        <button class="btn-ghost" onclick="loadRows()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          重新整理
        </button>
        <button class="btn-add" id="btnAdd" onclick="toggleForm()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新增資料
        </button>
      </div>
    </div>

    <!-- ── Batch Add Section ── -->
    <div id="batchSection" class="batch-section hidden">
      <div class="batch-header">
        <div class="batch-header-left">
          <span class="batch-title">新增活動資料</span>
          <span class="batch-hint">可同時新增多筆，完成後統一送出</span>
        </div>
        <button class="batch-close" onclick="toggleForm()" title="收合">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Column Labels -->
      <div class="batch-col-labels">
        <span class="bcl-no">No.</span>
        <span class="bcl-category">類別</span>
        <span class="bcl-event">活動名稱 <em>*</em></span>
        <span class="bcl-date">活動日期</span>
        <span class="bcl-contact">聯絡人 <em>*</em></span>
        <span class="bcl-action"></span>
      </div>

      <div class="batch-rows" id="batchRows">
        <!-- rows injected by JS -->
      </div>

      <div class="batch-footer">
        <button class="btn-add-row" onclick="addBatchRow()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新增一行
        </button>
        <button class="btn-submit-batch" id="btnSubmitBatch" onclick="submitBatch(this)">
          送出並加到待審核
        </button>
      </div>
    </div>

    <!-- ── Table Container ── -->
    <div class="table-container">

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab active" id="tabPublished" onclick="setFilter('approved', this)">已發佈</button>
        <button class="tab" id="tabPending" onclick="setFilter('pending', this)">
          待審核
          <span class="tab-badge" id="pendingBadge" style="display:none">0</span>
        </button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-no">No.</th>
              <th class="col-cat">類別</th>
              <th class="col-event">活動名稱</th>
              <th class="col-date">日期</th>
              <th class="col-contact">聯絡人</th>
              <th class="col-actions">操作</th>
            </tr>
          </thead>
          <tbody id="mainTable">
            <tr><td colspan="6" class="empty">
              <div class="loading-spinner"></div>
              <p>載入中...</p>
            </td></tr>
          </tbody>
        </table>
      </div>

      <!-- Table Footer -->
      <div class="table-footer">
        <span id="rowCountLabel" class="row-count">共 0 筆資料</span>
      </div>

    </div>
    <!-- /.table-container -->

  </div>
  <!-- /.main -->

</div>
<!-- /.layout -->


<!-- ── Toast ── -->
<div id="toast"></div>


<!-- ── Edit Modal ── -->
<div class="dialog-overlay" id="editDialog">
  <div class="dialog dialog-edit">
    <div class="dialog-title">編輯活動資料</div>
    <input type="hidden" id="editRowId">
    <div class="edit-form">
      <div class="edit-field">
        <label>No.</label>
        <input type="text" id="editNo" placeholder="活動編號（選填）">
      </div>
      <div class="edit-field">
        <label>類別</label>
        <select id="editCategory">
          <option value="採洽會">採洽會</option>
          <option value="海外展覽">海外展覽</option>
          <option value="國內展覽">國內展覽</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="edit-field">
        <label>活動名稱 <em>*</em></label>
        <input type="text" id="editEventName" placeholder="輸入活動名稱">
      </div>
      <div class="edit-field">
        <label>活動日期</label>
        <input type="text" id="editDate" placeholder="2025/01/01 - 2025/01/05">
      </div>
      <div class="edit-field">
        <label>聯絡人 <em>*</em></label>
        <input type="text" id="editContact" placeholder="聯絡人姓名">
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeEditDialog()">取消</button>
      <button class="btn-confirm-edit" id="confirmEditBtn" onclick="executeEdit()">儲存變更</button>
    </div>
  </div>
</div>


<!-- ── Delete Confirm Dialog ── -->
<div class="dialog-overlay" id="deleteDialog">
  <div class="dialog">
    <div class="dialog-icon">🗑️</div>
    <div class="dialog-title">確認刪除？</div>
    <div class="dialog-desc" id="deleteDialogDesc">此操作將永久刪除該筆資料，且無法復原。</div>
    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeDeleteDialog()">取消</button>
      <button class="btn-confirm-delete" id="confirmDeleteBtn" onclick="executeDelete()">確認刪除</button>
    </div>
  </div>
</div>


<script src="admin1.js"></script>
</body>
</html>
